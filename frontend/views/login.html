<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso · SIMI ERP</title>
    <link rel="stylesheet" href="public/css/style.css" />
  </head>
  <body>
    <div class="container">
      <h2>🔐 SIMI ERP</h2>
      <p>Ingresa tus credenciales</p>

      <form id="loginForm" novalidate>
        <label for="username">Usuario</label>
        <input
          type="text"
          id="username"
          placeholder="ej. admin"
          required
          autocomplete="username"
        />

        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />

        <button type="submit" id="loginButton">
          <span id="loginText">Ingresar</span>
          <span
            id="loginSpinner"
            class="loading-spinner"
            style="display: none"
          ></span>
        </button>
      </form>

      <p id="error-msg"></p>
    </div>

    <script>
      (function () {
        const form = document.getElementById("loginForm");
        const errorMsg = document.getElementById("error-msg");
        const loginBtn = document.getElementById("loginButton");
        const loginText = document.getElementById("loginText");
        const loginSpinner = document.getElementById("loginSpinner");

        // Mostrar error con animación
        function showError(message) {
          errorMsg.textContent = message;
          errorMsg.classList.add("show");
          errorMsg.style.display = "flex";
        }

        function hideError() {
          errorMsg.classList.remove("show");
          errorMsg.style.display = "none";
        }

        function setLoading(isLoading) {
          if (isLoading) {
            loginBtn.disabled = true;
            loginText.textContent = "Validando...";
            loginSpinner.style.display = "inline-block";
          } else {
            loginBtn.disabled = false;
            loginText.textContent = "Ingresar";
            loginSpinner.style.display = "none";
          }
        }

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          hideError();

          const username = document.getElementById("username").value.trim();
          const password = document.getElementById("password").value.trim();

          if (!username || !password) {
            showError("Por favor, completa todos los campos.");
            return;
          }

          setLoading(true);

          try {
            const response = await fetch("/api/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ username, password }),
            });

            const data = await response.json();

            if (data.token) {
              localStorage.setItem("simi_token", data.token);
              window.location.href = "/dashboard";
            } else {
              showError(
                data.message || "Credenciales incorrectas. Intenta de nuevo.",
              );
            }
          } catch (err) {
            showError("Error de red. Verifica tu conexión.");
            console.error("Login error:", err);
          } finally {
            setLoading(false);
          }
        });

        // Limpiar error al escribir
        document.querySelectorAll("#username, #password").forEach((input) => {
          input.addEventListener("input", hideError);
        });
      })();
    </script>
  </body>
</html>
