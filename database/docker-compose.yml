version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: postgres-simi
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: SimiERP2026!
      POSTGRES_DB: simi_erp
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d simi_erp"]
      interval: 10s
      timeout: 5s
      retries: 5